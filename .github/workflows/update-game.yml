name: Update Space Shooter Game

on:
  schedule:
    - cron: '0 0 * * *'    # каждый день в 00:00 UTC
  workflow_dispatch:       # можно запускать вручную

permissions:
  contents: write

jobs:
  update-game:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: czl9707/gh-space-shooter@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          output-path: 'game.gif'
          strategy: 'random'     # можно: random, column, row
          fps: 40